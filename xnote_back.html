<div style="text-align:center;">
    <div id="buttons" style="display:flex; justify-content:center; margin-top:1.5rem;">
        <button id="pleco-lookup" style="font-size:1.2rem; background:var(--btn-bg); color:var(--btn-fg); border:var(--stroke-thin) solid var(--btn-border); border-radius:var(--radii); padding:0.4em 0.7em; cursor:pointer;">&#x1F50D;</button>
    </div>
    <div id="character-lines" style="margin-top:1.5rem;">
        <div style="font-size:48px;line-height:1;font-family:'xcard-kaiti';margin-bottom:0.3rem;">{{text-sc}} | {{text-tc}}</div>
        <div style="font-size:64px;line-height:1;font-family:'xcard-mbanquetpprc';margin-bottom:0.3rem;">{{text-sc}}</div>
        <div style="font-size:28px;line-height:1.2;">[ {{pinyin}} ]</div>
    </div>
    <p style="font-size:1.15rem;line-height:1.5;margin-top:1.2rem;max-width:24rem;margin-inline:auto;">{{definition}}</p>
</div>

<script>
    document.getElementById("pleco-lookup").addEventListener('click', function() {
        var text = "{{text-sc}}";
        window.open("plecoapi://x-callback-url/s?q=" + text, "_blank");
    });
    var bg = getComputedStyle(document.body).backgroundColor;
    document.getElementById("pleco-lookup").style.backgroundColor = bg;
</script>
